name: Auto‑Translator (@T@)

on:
  push:
    paths:
      - '*.md'
      - '**/*.md'
    branches:
      - main
  workflow_dispatch:

jobs:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests deep-translator

      - name: Get target languages
        id: langs
        run: |
          LANGS=$(ls -d i18n/*/ 2>/dev/null | sed 's|i18n/||g; s|/||g' | grep -v '^fa$' | tr '\n' ' ')
          echo "langs=$LANGS" >> $GITHUB_OUTPUT

      - name: Run translation (@T@)
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
          INPUT_LANGS: ${{ steps.langs.outputs.langs }}
        run: python3 tools/translate_by_T.py

      - name: Commit and push translations as @T@
        run: |
          git config user.name "@T@ (Translator)"
          git config user.email "translator@shiftopia.world"
          git add i18n/
          git commit -m "chore(i18n): auto‑translation by @T@ – all languages updated" || echo "No changes"
          git push
