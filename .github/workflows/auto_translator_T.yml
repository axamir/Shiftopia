name: Auto‑Translator (@T@)

on:
  push:
    paths:
      - '*.md'
      - '**/*.md'
    branches:
      - main
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests deep-translator

      - name: Get target languages
        id: langs
        run: |
          LANGS=$(ls -d i18n/*/ 2>/dev/null | sed 's|i18n/||g; s|/||g' | grep -v '^fa$' | tr '\n' ' ')
          echo "langs=$LANGS" >> $GITHUB_OUTPUT

      - name: Run translation (@T@)
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          python3 - << 'PYSCRIPT'
import os, sys, time, requests
from pathlib import Path
from deep_translator import GoogleTranslator

ROOT = Path.cwd()
EXCLUDE_DIRS = {'.git', '.github', 'assets', 'tools', 'CHAIN', 'i18n', 'node_modules', '__pycache__'}
LANG_CODES = os.environ.get('INPUT_LANGS', 'es fr de ar zh hi ja ru pt it ko tr nl pl sv ur he').split()

def should_skip(line):
    s = line.strip()
    if not s or s.startswith('```') or '|' in s or '`' in s:
        return True
    if s.startswith(('![', '[')) and '](' in s:
        return True
    return False

def translate_text(text, target):
    if not text.strip():
        return text
    try:
        if os.environ.get('DEEPL_API_KEY'):
            url = "https://api-free.deepl.com/v2/translate"
            params = {'auth_key': os.environ['DEEPL_API_KEY'], 'text': text, 'target_lang': target.upper()}
            resp = requests.post(url, data=params).json()
            return resp['translations'][0]['text']
        else:
            translator = GoogleTranslator(source='en', target=target)
            return translator.translate(text)
    except Exception:
        return text

def translate_file(src, dst, lang):
    dst.parent.mkdir(parents=True, exist_ok=True)
    with open(src, 'r', encoding='utf-8') as f:
        lines = f.readlines()
    out = []
    for line in lines:
        if should_skip(line):
            out.append(line.rstrip('\n'))
        else:
            out.append(translate_text(line.rstrip('\n'), lang))
        time.sleep(0.05)
    with open(dst, 'w', encoding='utf-8') as f:
        f.write('\n'.join(out))

md_files = []
for p in ROOT.rglob("*.md"):
    if any(ex in p.parts for ex in EXCLUDE_DIRS): continue
    if "i18n" in p.parts: continue
    md_files.append(p)

print(f"Found {len(md_files)} markdown files to translate.")
for lang in LANG_CODES:
    print(f"\n--- Translating to {lang} ---")
    for src in md_files:
        rel = src.relative_to(ROOT)
        dst = ROOT / "i18n" / lang / rel
        translate_file(src, dst, lang)
print("Translation completed by @T@.")
PYSCRIPT
        env:
          INPUT_LANGS: ${{ steps.langs.outputs.langs }}

      - name: Commit and push translations as @T@
        run: |
          git config user.name "@T@ (Translator)"
          git config user.email "translator@shiftopia.world"
          git add i18n/
          git commit -m "chore(i18n): auto‑translation by @T@ – all languages updated" || echo "No changes"
          git push
