name: Official Translator (@T@)
on:
  schedule:
    - cron: '0 0 * * 1'   # هر دوشنبه ساعت 00:00 UTC
  workflow_dispatch:

jobs:
  translate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install deep-translator
      - name: Run safe translation script
        id: translate
        continue-on-error: true
        run: python3 tools/translate_safe.py
      - name: Commit changes if any
        run: |
          git config user.name "@T@ (Translator)"
          git config user.email "translator@shiftopia.world"
          git add i18n/
          git commit -m "chore(i18n): auto-translate content (safe mode)" || echo "No changes to commit"
          git push
      - name: Create help issue if translation failed
        if: steps.translate.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "🌍 Help Needed: Translation failed" \
            --body "The automated translation script encountered an error. Please manually translate the latest English content using DeepL or community contributions.\n\nTarget languages: es, fr, de, ar, zh, ja, ru, pt, it\n\nAfter translation, submit a Pull Request." \
            --label "translation,help-wanted"
