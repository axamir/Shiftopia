name: Record Transaction

on:
  issues:
    types: [closed]

jobs:
  record:
    if: contains(github.event.issue.labels.*.name, 'transaction')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse transaction data
        id: parse
        run: |
          TITLE="${{ github.event.issue.title }}"
          # Expected format: "Transaction: from -> to amount (reason)"
          # Example: "Transaction: @x@ -> Treasury 2 (Coffee at Café Zero)"
          FROM=$(echo "$TITLE" | sed -n 's/.*Transaction: \(.*\) -> .*/\1/p')
          TO=$(echo "$TITLE" | sed -n 's/.*-> \(.*\) [0-9]* (.*/\1/p')
          AMOUNT=$(echo "$TITLE" | sed -n 's/.*-> .* \([0-9]*\) (.*/\1/p')
          REASON=$(echo "$TITLE" | sed -n 's/.*-> .* [0-9]* (\(.*\))/\1/p')
          DATE=$(date -u +"%Y-%m-%d")
          echo "from=$FROM" >> $GITHUB_OUTPUT
          echo "to=$TO" >> $GITHUB_OUTPUT
          echo "amount=$AMOUNT" >> $GITHUB_OUTPUT
          echo "reason=$REASON" >> $GITHUB_OUTPUT
          echo "date=$DATE" >> $GITHUB_OUTPUT

      - name: Append to ledger
        run: |
          echo "| ${{ steps.parse.outputs.date }} | ${{ steps.parse.outputs.from }} | ${{ steps.parse.outputs.to }} | ${{ steps.parse.outputs.amount }} | ${{ steps.parse.outputs.reason }} |" >> ECONOMY/LEDGER.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ECONOMY/LEDGER.md
          git commit -m "docs: record transaction #${{ github.event.issue.number }}" || echo "No changes"
          git push
