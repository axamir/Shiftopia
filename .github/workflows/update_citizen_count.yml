name: Update Citizen Count

on:
  push:
    paths:
      - 'CITIZENS/INDEX.csv'
  schedule:
    - cron: '0 0 * * *'  # daily at midnight UTC
  workflow_dispatch:

jobs:
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Count citizens
        id: count
        run: |
          COUNT=$(tail -n +2 CITIZENS/INDEX.csv | wc -l | tr -d ' ')
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Update English README badge
        run: |
          sed -i "s/\(Citizens:\) [0-9]*/\1 ${{ steps.count.outputs.count }}/" README.md

      - name: Update Persian README badge
        run: |
          sed -i "s/\(شهروندان:\) [0-9]*/\1 ${{ steps.count.outputs.count }}/" i18n/fa/README.md

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md i18n/fa/README.md
          git commit -m "docs: update citizen count to ${{ steps.count.outputs.count }}" || echo "No changes"
          git push
