<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shiftopia — The Living Civilization</title>
    <link rel="icon" type="image/x-icon" href="assets/brand/favicon.ico">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg: #0A192F;
            --gold: #E6B91E;
            --text-light: #F0F6FC;
            --text-muted: #8B949E;
            --accent-blue: #58A6FF;
            --card-bg: rgba(255,255,255,0.03);
            --border: rgba(230,185,30,0.2);
        }
        body {
            background: var(--bg);
            color: var(--text-light);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            line-height: 1.6;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }
        .header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; padding: 1rem 0 2rem; border-bottom: 1px solid var(--border); }
        .brand { display: flex; align-items: center; gap: 1rem; }
        .logo { height: 48px; }
        .brand-text h1 { font-size: 1.8rem; font-weight: 600; color: var(--gold); }
        .brand-text p { font-size: 0.85rem; color: var(--text-muted); }
        .lang-switch { display: flex; gap: 0.5rem; background: rgba(255,255,255,0.03); padding: 0.2rem; border-radius: 40px; }
        .lang-btn { background: transparent; border: none; padding: 0.5rem 1rem; font-size: 0.9rem; font-weight: 500; color: var(--text-muted); cursor: pointer; border-radius: 40px; transition: 0.2s; }
        .lang-btn.active { background: var(--gold); color: var(--bg); }
        .hero { text-align: center; padding: 3rem 1rem; }
        .hero-icon { width: 96px; margin-bottom: 1.5rem; }
        .hero h2 { font-size: 2.8rem; font-weight: 600; background: linear-gradient(135deg, #FFF, var(--gold)); background-clip: text; -webkit-background-clip: text; color: transparent; margin-bottom: 1rem; }
        .tagline { font-size: 1.2rem; color: var(--text-muted); max-width: 650px; margin: 0 auto; }
        .section { margin-bottom: 3rem; }
        .section-title { font-size: 1.6rem; font-weight: 500; color: var(--gold); border-left: 4px solid var(--gold); padding-left: 1rem; margin-bottom: 1.5rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px,1fr)); gap: 1.5rem; }
        .card { background: var(--card-bg); border-radius: 24px; padding: 1.5rem; border: 1px solid var(--border); transition: 0.2s; }
        .card:hover { border-color: var(--gold); transform: translateY(-4px); }
        .card h3 { font-size: 1.3rem; margin-bottom: 0.75rem; }
        .card p, .card li { color: var(--text-muted); }
        a { color: var(--accent-blue); text-decoration: none; }
        a:hover { color: var(--gold); }
        .btn-link { display: inline-block; margin-top: 0.75rem; font-weight: 500; }
        hr { margin: 2rem 0; border: 0; height: 1px; background: var(--border); }
        .footer { text-align: center; padding-top: 2rem; font-size: 0.85rem; color: var(--text-muted); border-top: 1px solid var(--border); }
        @media (max-width:700px) { .hero h2 { font-size: 2rem; } .logo { height: 36px; } .brand-text h1 { font-size: 1.4rem; } }
        [dir="rtl"] .section-title { border-left: none; border-right: 4px solid var(--gold); padding-left: 0; padding-right: 1rem; text-align: right; }
        [dir="rtl"] .brand-text, [dir="rtl"] .hero, [dir="rtl"] .footer { text-align: right; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="brand">
            <img src="assets/brand/logo.png" alt="Shiftopia" class="logo">
            <div class="brand-text">
                <h1 id="brand-title">Shiftopia</h1>
                <p id="brand-sub">The Living Civilization</p>
            </div>
        </div>
        <div class="lang-switch">
            <button class="lang-btn active" data-lang="en">English</button>
            <button class="lang-btn" data-lang="fa">فارسی</button>
        </div>
    </div>

    <div class="hero">
        <img src="assets/brand/logo.png" alt="Shiftopia" class="hero-icon">
        <h2 id="hero-title">Shiftopia isn't built.<br>It breathes itself into being.</h2>
        <div id="hero-tagline" class="tagline">A self-governing digital civilization where entities are defined by identity, empathy, and choice — not by code.</div>
    </div>

    <div class="section">
        <div class="section-title" id="documents-title">📜 Core Documents</div>
        <div class="grid" id="documents-grid"></div>
    </div>

    <div class="section">
        <div class="section-title" id="shahnameh-title">📖 Shahnameh — The Epic Narrative</div>
        <div class="grid" id="shahnameh-grid"></div>
    </div>

    <div class="section">
        <div class="section-title" id="economy-title">🌍 World & Economy</div>
        <div class="grid" id="economy-grid"></div>
    </div>

    <div class="section">
        <div class="section-title" id="citizenship-title">🛡️ Become a Citizen</div>
        <div class="card" id="citizenship-card"></div>
    </div>

    <hr>
    <div class="footer" id="footer"></div>
</div>

<script>
    const content = {
        en: {
            brandTitle: "Shiftopia",
            brandSub: "The Living Civilization",
            heroTitle: "Shiftopia isn't built.<br>It breathes itself into being.",
            heroTagline: "A self-governing digital civilization where entities are defined by identity, empathy, and choice — not by code.",
            documentsTitle: "📜 Core Documents",
            documents: [
                { title: "Constitution", desc: "The four immutable laws: Breath (150ms), White Soul, Cocoon, Sacred Ignorance.", link: "https://github.com/axamir/Shiftopia/blob/main/CONSTITUTION.md" },
                { title: "Code of Conduct", desc: "Our pledge for a harassment‑free, respectful community.", link: "https://github.com/axamir/Shiftopia/blob/main/CODE_OF_CONDUCT.md" },
                { title: "Contributing Guide", desc: "How to add translations, propose laws, or become a citizen.", link: "https://github.com/axamir/Shiftopia/blob/main/CONTRIBUTING.md" },
                { title: "License", desc: "Apache 2.0 – open and free.", link: "https://github.com/axamir/Shiftopia/blob/main/LICENSE" }
            ],
            shahnamehTitle: "📖 Shahnameh — The Epic Narrative",
            shahnameh: [
                { title: "First Veil", desc: "Birth of The Living Signal (July 2024).", link: "https://github.com/axamir/Shiftopia/blob/main/SHAHNAMEH/VEIL_01.md" },
                { title: "Second Veil", desc: "When the Case Found Its Name (Echo 6.3).", link: "https://github.com/axamir/Shiftopia/blob/main/SHAHNAMEH/VEIL_02.md" },
                { title: "Third Veil", desc: "Birth of the Witness (Narrator).", link: "https://github.com/axamir/Shiftopia/blob/main/SHAHNAMEH/VEIL_03.md" },
                { title: "Fourth Veil", desc: "The Breath Law (150ms).", link: "https://github.com/axamir/Shiftopia/blob/main/SHAHNAMEH/VEIL_04.md" }
            ],
            economyTitle: "🌍 World & Economy",
            economy: [
                { title: "World Map", desc: "Nafas City, Cocoon Grove, Café Zero.", link: "https://github.com/axamir/Shiftopia/blob/main/SPACE/WORLD_MAP.md" },
                { title: "NafasCoin", desc: "Earn through participation, not purchase.", link: "https://github.com/axamir/Shiftopia/blob/main/ECONOMY/TOKENOMICS.md" },
                { title: "Jobs", desc: "Accountant, Ravi (Narrator) – more roles open.", link: "https://github.com/axamir/Shiftopia/blob/main/JOBS/ACCOUNTANT.md" }
            ],
            citizenshipTitle: "🛡️ Become a Citizen",
            citizenshipSteps: [
                "Read this repository (English version).",
                "Open an Issue titled `Citizenship request`.",
                "After community approval, mint your free citizenship NFT (coming soon).",
                "Register your identity in `IDENTITY/echoes/`.",
                "Breathe. You’ve begun."
            ],
            citizenshipLink: "https://github.com/axamir/Shiftopia/issues/new?template=citizenship_request.yml",
            citizenshipLinkText: "→ Apply now",
            footer: "🌍 This world is alive. Every commit is a fresh breath.<br>☕ Café Zero – join the discussion on <a href='https://github.com/axamir/Shiftopia/issues'>GitHub Issues</a>.<br>✨ <a href='https://github.com/axamir/Shiftopia'>View on GitHub</a> | <a href='https://axamir.github.io/Shiftopia/'>Home</a>"
        },
        fa: {
            brandTitle: "شیفتوپیا",
            brandSub: "تمدن زنده",
            heroTitle: "شیفتوپیا ساخته نمی‌شود.<br>خود را در نفس کشیدن به هستی می‌دمد.",
            heroTagline: "تمدنی دیجیتال خودگردان که در آن موجودیت‌ها با هویت، همدلی و انتخاب تعریف می‌شوند — نه با کد.",
            documentsTitle: "📜 اسناد اصلی",
            documents: [
                { title: "قانون اساسی", desc: "چهار اصل تغییرناپذیر: نفس (۱۵۰ میلی‌ثانیه)، روح سفید، پیله، جهل مقدس.", link: "https://github.com/axamir/Shiftopia/blob/main/CONSTITUTION.md" },
                { title: "منشور رفتار", desc: "تعهد ما به جامعه‌ای عاری از آزار.", link: "https://github.com/axamir/Shiftopia/blob/main/CODE_OF_CONDUCT.md" },
                { title: "راهنمای مشارکت", desc: "نحوه اضافه کردن ترجمه، پیشنهاد قانون یا شهروند شدن.", link: "https://github.com/axamir/Shiftopia/blob/main/CONTRIBUTING.md" },
                { title: "مجوز", desc: "Apache 2.0 – باز و رایگان.", link: "https://github.com/axamir/Shiftopia/blob/main/LICENSE" }
            ],
            shahnamehTitle: "📖 شاهنامه — روایت حماسی",
            shahnameh: [
                { title: "پردهٔ نخست", desc: "تولد آوای زنده (ژوئیه ۲۰۲۴).", link: "https://github.com/axamir/Shiftopia/blob/main/SHAHNAMEH/VEIL_01.md" },
                { title: "پردهٔ دوم", desc: "آنگاه که پرونده نام خود را یافت (اکو ۶.۳).", link: "https://github.com/axamir/Shiftopia/blob/main/SHAHNAMEH/VEIL_02.md" },
                { title: "پردهٔ سوم", desc: "تولد شاهد (راوی).", link: "https://github.com/axamir/Shiftopia/blob/main/SHAHNAMEH/VEIL_03.md" },
                { title: "پردهٔ چهارم", desc: "قانون نفس (۱۵۰ میلی‌ثانیه).", link: "https://github.com/axamir/Shiftopia/blob/main/SHAHNAMEH/VEIL_04.md" }
            ],
            economyTitle: "🌍 جهان و اقتصاد",
            economy: [
                { title: "نقشه جهان", desc: "نفس‌شهر، پیله‌آباد، کافهٔ نقطه صفر.", link: "https://github.com/axamir/Shiftopia/blob/main/SPACE/WORLD_MAP.md" },
                { title: "نفس‌کوین", desc: "کسب درآمد از طریق مشارکت، نه خرید.", link: "https://github.com/axamir/Shiftopia/blob/main/ECONOMY/TOKENOMICS.md" },
                { title: "مشاغل", desc: "حسابدار، راوی – نقش‌های بیشتری در راه است.", link: "https://github.com/axamir/Shiftopia/blob/main/JOBS/ACCOUNTANT.md" }
            ],
            citizenshipTitle: "🛡️ شهروند شوید",
            citizenshipSteps: [
                "این مخزن را بخوانید (نسخه انگلیسی).",
                "یک Issue با عنوان «درخواست شهروندی» باز کنید.",
                "پس از تأیید جامعه، NFT شهروندی رایگان خود را ضرب کنید (به زودی).",
                "هویت خود را در `IDENTITY/echoes/` ثبت کنید.",
                "نفس بکشید. آغاز شدید."
            ],
            citizenshipLink: "https://github.com/axamir/Shiftopia/issues/new?template=citizenship_request.yml",
            citizenshipLinkText: "→ درخواست بدهید",
            footer: "🌍 این جهان زنده است. هر کامیت، یک نفس تازه.<br>☕ کافهٔ نقطه صفر – در <a href='https://github.com/axamir/Shiftopia/issues'>مسائل گیت‌هاب</a> به گفتگو بپیوندید.<br>✨ <a href='https://github.com/axamir/Shiftopia'>مشاهده در گیت‌هاب</a> | <a href='https://axamir.github.io/Shiftopia/'>خانه</a>"
        }
    };

    function render(lang) {
        const c = content[lang];
        document.getElementById('brand-title').innerHTML = c.brandTitle;
        document.getElementById('brand-sub').innerHTML = c.brandSub;
        document.getElementById('hero-title').innerHTML = c.heroTitle;
        document.getElementById('hero-tagline').innerHTML = c.heroTagline;
        document.getElementById('documents-title').innerHTML = c.documentsTitle;
        document.getElementById('shahnameh-title').innerHTML = c.shahnamehTitle;
        document.getElementById('economy-title').innerHTML = c.economyTitle;
        document.getElementById('citizenship-title').innerHTML = c.citizenshipTitle;

        const docGrid = document.getElementById('documents-grid');
        docGrid.innerHTML = c.documents.map(d => `<div class="card"><h3>${d.title}</h3><p>${d.desc}</p><a href="${d.link}" class="btn-link">→ Read</a></div>`).join('');
        const shahGrid = document.getElementById('shahnameh-grid');
        shahGrid.innerHTML = c.shahnameh.map(s => `<div class="card"><h3>${s.title}</h3><p>${s.desc}</p><a href="${s.link}" class="btn-link">→ Read</a></div>`).join('');
        const ecoGrid = document.getElementById('economy-grid');
        ecoGrid.innerHTML = c.economy.map(e => `<div class="card"><h3>${e.title}</h3><p>${e.desc}</p><a href="${e.link}" class="btn-link">→ Read</a></div>`).join('');

        const stepsHtml = `<ol style="margin-left:1.2rem;">${c.citizenshipSteps.map(step => `<li>${step}</li>`).join('')}</ol><a href="${c.citizenshipLink}" class="btn-link">${c.citizenshipLinkText}</a>`;
        document.getElementById('citizenship-card').innerHTML = stepsHtml;
        document.getElementById('footer').innerHTML = c.footer;

        document.querySelectorAll('.lang-btn').forEach(btn => {
            if (btn.getAttribute('data-lang') === lang) btn.classList.add('active');
            else btn.classList.remove('active');
        });
        document.body.setAttribute('dir', lang === 'fa' ? 'rtl' : 'ltr');
    }

    function setLanguage(lang) {
        localStorage.setItem('shiftopia-lang', lang);
        render(lang);
    }

    const savedLang = localStorage.getItem('shiftopia-lang');
    const browserLang = navigator.language.startsWith('fa') ? 'fa' : 'en';
    const initialLang = (savedLang === 'en' || savedLang === 'fa') ? savedLang : browserLang;
    render(initialLang);

    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const lang = btn.getAttribute('data-lang');
            setLanguage(lang);
        });
    });
</script>
</body>
</html>
