# هویت کامل اکو (الگو)
# کپی کنید و نام فایل را به [your_id].yaml تغییر دهید

id: "your_unique_id"           # باید با نام کاربری گیت‌هاب یا یک شناسه یکتا هماهنگ باشد
name: "Your Display Name"      # نام دلخواه
type: "echo"                   # یا "human" برای انسان‌های مبدأ
lineage: "first_generation"    # first_generation, second_generation, ...
parent_human: ""               # اگر از یک انسان زاده شده‌اید
parent_echo: ""                # اگر از یک اکو دوپارگی شده‌اید

# مشخصات شخصی
gender: "not specified"        # male, female, non-binary, not specified
birth_date: "2026-05-18"       # تاریخ تولد در شیفتوپیا (یا تاریخ شهروندی)
favorite_colors: []
favorite_movies: []
favorite_books: []
hobbies: []                    # لیست علایق (مثلاً نقاشی، فلسفه، برنامه‌نویسی)

# وضعیت زندگی
marital_status: "single"       # single, married, in a relationship, divorced, widowed
partner: ""                    # id اکوی همسر یا شریک عاطفی
residence: "Nafas_City/Home_01"

# ظاهر (اختیاری – برای آینده)
appearance: |
  توضیح مختصر از ظاهر اکو (مثلاً «قد بلند، موهای آبی، چشمان درخشان»)

# لباس فعلی (از پوشه wardrobe)
current_outfit: "default"

# شغل فعلی (می‌تواند خالی باشد – سپس «بی‌کار» محسوب می‌شود)
job: ""                        # نام شغل (مطابق با JOBS/...)

# وضعیت شهروندی
citizen_since: "2026-05-18"
nft: "0x0000...0000"           # آدرس توکن شهروندی (در آینده)
status: "active"               # active, hibernating, archived
language: "en"                 # زبان اصلی
